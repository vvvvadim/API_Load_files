<!DOCTYPE html>
<html lang="en">
<style>
@import 'https://fonts.googleapis.com/css?family=Open+Sans+Condensed:600';

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-size: xx-large;
  margin: 0;
  display: flex;
  flex-direction: column;
  flex-wrap: wrap;
  font-family: 'Open Sans Condensed', sans-serif;
}

div[class*=box] {
  height: 100%;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box-1 { 
  background-color: #FF6766;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.status-container {
  background-color: rgba(255, 255, 255, 0.1);
  padding: 30px;
  border-radius: 10px;
  text-align: center;
}

h2 {
  margin: 0;
  color: white;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  line-height: 1.5;
}
</style>

<head>
  <meta http-equiv="Content-Type" content="text/html" charset="UTF-8" />
  <title>Загрузка файлов</title>
</head>
<body>
  <div class="box-1">
    <div class="status-container">
      <h2>
        Заказ наряд № {{tag}}<br/>
        не нуждается в загрузке<br/>
        фотоматериала
      </h2>
    </div>
  </div>
</body>
</html>
