<!DOCTYPE html>
<html>
<style>

      @import 'https://fonts.googleapis.com/css?family=Open+Sans+Condensed:600';

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  margin: 0;
  display: flex;
  flex-direction: column;
  flex-wrap: wrap;
  font-family: 'Open Sans Condensed', sans-serif;
}

div[class*=box] {
  height: 100%;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box-1 { background-color: #FF6766; }

.btn {
  line-height: 150px;
  height: 150px;
  text-align: center;
  width: 1250px;
  cursor: pointer;
}

/*
========================
      BUTTON ONE
========================
*/
.btn-one {
  color: #FFF;
  transition: all 0.3s;
  position: relative;
}
.btn-one span {
  transition: all 0.3s;
}
.btn-one::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  opacity: 0;
  transition: all 0.3s;
  border-top-width: 1px;
  border-bottom-width: 1px;
  border-top-style: solid;
  border-bottom-style: solid;
  border-top-color: rgba(255,255,255,0.5);
  border-bottom-color: rgba(255,255,255,0.5);
  transform: scale(0.1, 1);
}
.btn-one:hover span {
  letter-spacing: 2px;
}
.btn-one:hover::before {
  opacity: 1;
  transform: scale(1, 1);
}
.btn-one::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  transition: all 0.3s;
  background-color: rgba(255,255,255,0.1);
}
.btn-one:hover::after {
  opacity: 0;
  transform: scale(0.1, 1);
}
        </style>



<!-- Hover #1 -->
<div class="box-1">

    <form action="/upload" enctype="multipart/form-data" method="post">
        <input name="tag" type="hidden" value={{tag}} />
            <p>ID: {{tag}} </p>
        <p>Загрузите ваши фотографии на сервер</p>

        <p> <input class="btn btn-one" type="file" name="files" multiple accept="image/*,image/jpeg" >



       <input type="submit" value="Отправить"> </p>



  </form>
</div>
